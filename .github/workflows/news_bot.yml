name: UPSC AI News Harvester

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: main  # 1. This keeps the robot on the actual branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install feedparser google-generativeai

      - name: Run AI Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_news.py

      - name: Commit and Push new JSON data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 2. Add the file and commit
          git add upsc_news.json
          git commit -m "Automated AI news update" || exit 0
          
          # 3. The "Force Sync" strategy
          git pull --rebase origin main
          git push origin main
