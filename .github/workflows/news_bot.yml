name: UPSC AI News Harvester

on:
  schedule:
    - cron: '*/50 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install -U feedparser groq requests beautifulsoup4

      - name: Run AI Scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CX_ID: ${{ secrets.GOOGLE_CX_ID }}
        run: python build_news.py

      - name: Commit and Push new JSON data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 👇 FIXED: Only tries to add the file if it actually exists
          if [ -f upsc_news.json ]; then
            git add upsc_news.json
            git commit -m "Automated AI news update" || echo "No changes to commit"
            git pull --rebase origin main
            git push origin main
          else
            echo "upsc_news.json not found, skipping git push."
          fi
