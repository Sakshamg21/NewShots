name: UPSC AI News Harvester

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # This allows you to run it manually!

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # FIXED: Downgraded from v6 to v4
        with:
          ref: main  # This keeps the robot on the actual branch

      - name: Set up Python
        uses: actions/setup-python@v5 # FIXED: Downgraded from v6 to v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install feedparser google-generativeai

      - name: Run AI Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_news.py

      - name: Commit and Push new JSON data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # Add the file and commit
          git add upsc_news.json
          git commit -m "Automated AI news update" || exit 0
          
          # The "Force Sync" strategy
          git pull --rebase origin main
          git push origin main
