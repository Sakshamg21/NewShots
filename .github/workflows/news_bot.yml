name: UPSC AI News Harvester

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to force a run manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This silences the annoying Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        # Added beautifulsoup4 and duckduckgo-search for the media scraper
        run: |
          pip install feedparser google-generativeai requests beautifulsoup4 duckduckgo-search

      - name: Run AI Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_news.py

      - name: Commit and Push new JSON data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # This adds the local JSON file to the repo as a backup
          git add upsc_news.json
          git commit -m "Automated AI news update" || exit 0
          
          # Sync with the cloud and push
          git pull --rebase origin main
          git push origin main
